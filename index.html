<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Story Day by Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-glow: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            height: 100svh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(30, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.9) 100%);
            z-index: -1;
        }

        /* Contenedor principal con flexbox para separar secciones */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* Cabecera: Fecha y contador */
        header {
            flex-shrink: 0;
            text-align: center;
            padding-bottom: 10px;
        }

        /* Centro: El mensaje (ahora con scroll independiente) */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            margin: 10px 0;
            scrollbar-width: none; /* Firefox */
        }
        main::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* Base: Los botones (fijos abajo) */
        footer {
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            text-align: center;
        }

        .font-serif-elegant { font-family: 'Playfair Display', serif; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .milestone-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-advance {
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 9999px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-advance:active {
            background: white;
            color: black;
            transform: scale(0.98);
        }

        /* CORRECCIÓN: Salta palabras completas pero maneja strings largos si es necesario */
        #message-text {
            width: 100%;
            overflow-wrap: break-word; /* Salta palabras completas */
            word-wrap: break-word;
            word-break: normal; /* No corta palabras a la mitad */
            white-space: pre-wrap;
            text-align: center;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 0;
        }

        /* Estilos de la Carta y Video */
        .modal-scene {
            background: rgba(0, 0, 0, 0.9);
            backdrop-blur: 10px;
        }
        
        .letter-content {
            max-height: 50vh;
            overflow-y: auto;
            word-break: normal;
        }

        .video-container {
            width: 90vw;
            max-width: 320px;
            aspect-ratio: 9 / 16;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div id="particles-container"></div>

    <div class="app-container" id="timeline-scene">
        <!-- HEADER -->
        <header>
            <div id="day-counter" class="text-[9px] uppercase tracking-[0.4em] mb-2 opacity-40 font-light">
                Loading...
            </div>
            <h1 id="date-display" class="text-4xl md:text-7xl font-serif-elegant transition-all duration-700">March 18</h1>
        </header>

        <!-- MAIN MESSAGE -->
        <main>
            <div id="message-container" class="fade-in w-full">
                <p id="message-text" class="text-base md:text-xl leading-relaxed font-light text-gray-300 italic px-2">
                    ...
                </p>
            </div>
        </main>

        <!-- FOOTER BUTTONS -->
        <footer>
            <div class="flex flex-col gap-3 items-center">
                <div class="flex justify-center gap-3 w-full">
                    <button id="btn-prev" onclick="previousDay()" class="flex-1 max-w-[140px] py-3 btn-advance uppercase tracking-[0.2em] text-[9px] opacity-0 pointer-events-none transition-all duration-300">
                        Go Back
                    </button>
                    <button id="btn-next" onclick="advanceDay()" class="flex-1 max-w-[140px] py-3 btn-advance uppercase tracking-[0.2em] text-[9px]">
                        Next Day
                    </button>
                </div>
                
                <button id="btn-letter" onclick="showLetter()" class="hidden w-full max-w-[290px] py-4 bg-white text-black rounded-full uppercase tracking-[0.3em] text-[10px] font-bold transition-all">
                    Read my letter
                </button>

                <div id="final-stats" class="mt-4 hidden fade-in">
                    <div class="h-px w-12 bg-white/20 mx-auto mb-2"></div>
                    <p class="text-gray-500 text-[8px] font-light uppercase tracking-[0.2em]">Our First Month • 2026</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- ESCENA DE LA CARTA -->
    <div id="letter-scene" class="hidden fixed inset-0 z-30 flex items-center justify-center p-4 modal-scene">
        <div class="bg-[#0f0f0f] w-full max-w-lg p-6 md:p-10 rounded-2xl border border-white/5 shadow-2xl fade-in overflow-y-auto max-h-[90vh]">
            <h2 class="font-serif-elegant text-2xl mb-6 text-white border-b border-white/10 pb-4 italic">For my Love....</h2>
            <div class="letter-content text-gray-300 leading-relaxed font-light italic text-sm md:text-base mb-8">
                <!-- Inyectado por JS -->
            </div>
            <div class="border-t border-white/10 pt-6 flex flex-col gap-4">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="font-cursive text-xl text-white">With Love, me.</p>
                        <p class="text-[8px] uppercase tracking-widest text-gray-500">May 14, 2026</p>
                    </div>
                    <button onclick="hideLetter()" class="text-[9px] uppercase tracking-widest text-gray-500 hover:text-white underline">Close</button>
                </div>
                <button onclick="showVideo()" class="w-full py-3 bg-white/5 border border-white/10 text-white rounded-full text-[9px] uppercase tracking-[0.3em]">
                    Until I Found You
                </button>
            </div>
        </div>
    </div>

    <!-- ESCENA DEL VIDEO -->
    <div id="video-scene" class="hidden fixed inset-0 z-40 flex flex-col items-center justify-center bg-black p-4">
        <div class="video-container mb-6">
            <iframe id="video-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen class="w-full h-full border-none"></iframe>
        </div>
        <button onclick="hideVideo()" class="px-10 py-3 btn-advance uppercase tracking-[0.3em] text-[9px]">Back</button>
    </div>

    <script>
        const mensajesPersonalizados = {

            "March 28": "Tayo, Tayo, Tayo, Tayo, he's a friendly little bus, \n Speeding up, slowing down, Tayo always loves to run \n Tayo, Tayo, Tayo, Tayo, he's a friendly little bus \n Speeding up, slowing down, Tayo's always having fun \n Turn up the volume", 
            "March 29": "I always have a lot of fun with you, I hope you do too.",
            "March 30": "We keep playing and I keep making us lose :(, I'm so sorry",

            "April 2": "I've already marked your birthday on my calendar so I don't forget. Happy birthday of the best!",

            "April 4": "Neymar, Real Madrid, Strawberries, killer whale, seashells, Skye, corean dramas, rice and macaroni and other stuff motorcycles, watermelon, tayo tayo, etc. \n I'll try to remember the things you like, it's difficult because my memory doesn't always work :(",
            "April 5": "Messi, Barcelona, ​​American people, ketchup, tomato, banana, butterfly, avocado, mustard, etc. \n I'll try to remember the things you don't like, it's difficult because my memory doesn't always work :(",
            "April 6": "I'm going to have to be my sister's chef; I need to learn new recipes. Thanks for teaching me how to make your salad.",

            "April 8": "I'm excited and afraid to share this with you. Choose a day",
            "April 9": "I want to tell you something, but I don't know how to say it. I hope you understand me when I do.",
            "April 10": "I know tomorrow isn't the day yet, but I need to get rid of this burden. It's selfish of me, so I'm really sorry.",
            "April 11": "The day I finally let my heart speak. Nervous, hopeful, and certain that I didn't want to keep this feeling to myself anymore. I mustered up enough courage and selfishness to tell you how I felt: I liked you, I like you, and I will continue to like you mucho mucho mucho muchisisisisisisisisisisisisisimo. \n Turn up the volume Turn up the volume, but not too much, take care of your ears jejeje",
            "April 12": "Thank you so much for being sincere and honest with me. I was so scared of rejection, but you accepted me with open arms. I feel like the luckiest man in the world because I found someone as amazing as you.",

            "April 14": "The day you said yes. Our official 'Day One'. Thank you for being my most beautiful reality. Thank you for letting me be a part of your life and your story. Thank you for making me happy and letting me try to make you smile and try to make you fall in love with me.",
            "April 15": "Born too late see the dinosaurs, born too early to see flying cars, but born just in time to meet the most amazing person in the world (YOU).",
            "April 16": "When you feel sad, remember you have me, okay? I may not be much, but I will always be by your side, trying to make you happy and support you in everything. I want to be your safe place and your refuge",
            "April 17": "I want to be the reason you smile every day. I want to be the reason you feel loved and appreciated. I want to be the reason you feel special and unique. I want to be the reason you feel happy and fulfilled.",
            "April 18": "One month since the day I met you, an event as improbable as it was incredible, for which I am incredibly grateful. I guess I used up all my good luck, and you're worth it; I won the lottery.",
            "April 19": "I met a girl",
            "April 20": "And she is",
            "April 21": "Sooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo",
            "April 22": "Much pretty",
            "April 23": "And do you want to know?",
            "April 24": "Who is that girl?",
            "April 25": "<3<3<3You<3<3<3",
            "April 26": "I want to see you happy every day, that you can always show your beautiful smile",
            "April 27": "Your name is my favorite word \n Your voice is my favorite song \n Your eyes my favorite mirror \n Your 'Hm' is my favorite notification \n Your happiness is my favorite prayer \n And somehow \n everything that belongs to you \n  becomes my favorite too",
            "April 28": "Always remember, I can get tired of everything but not you. Even when I'm tired of everything, all I need is you",
            "April 29": "You are myyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy",
            "April 30": "favorite person <3\n favorite notification <3\n favorite reason to smile <3\n favorite part of my day<3",
            "May 1": "I'm going on a trip, I promise I'll show you how it goes and take pictures of everything I can.",
            "May 2": "I hope you have a great day, and remember that I will always be here for you, supporting you and trying to make you happy.",
            "May 3": "Today I went to the beach, rode a horse, had a lot of fun, I sent you lots of photos and videos of everything I did, sorry for the spam",
            "May 4": "I hope you liked all the photos and videos I sent you, I had a lot of fun taking them and sharing them with you.",
            "May 5": "just wanna say graciassssssssssssssssssssssssss for being yn my life, you are the best thing that has ever happened to me and I am so grateful to have you by my side and you are sooooo special to me",
            "May 6": "Maybe I'm not the best person in your life but as long as I can, I will give you all the effort, good treatment, happiness and love you deserve.",
            "May 7": "I am so lucky to have you in my life, I love youuuuu amor",
            "May 8": "Sorry Disney my princess is better than all of yours",
            "May 9": "You're so cute, I mean not just your looks, but yout personality too, the things you say are cute, your voice is cute, your laught is cute, your smile is cute. \n You are so perfect",
            "May 10": "I just wanted to say:",
            "May 11": "Thank you for coming into my life",
            "May 12": "Thank you for making me smile like crazy",
            "May 13": "Thank you for making me happy",
            "May 14": "Happy first month! Thirty days feeling like the luckiest man in the world because I found my Black Swan. Here's to many more! \n Muchas gracias for your patience, for understanding me, for putting up with me, for giving me your time. I truly appreciate it."
        };

        const contenidoCarta = `It seems incredible that today marks our first official month together. I look back to that March 18th when it all began as an improbable event, a true Black Swan that completely changed my world.

I already told you that you're my Black Swan, but there's another word that also describes you: you're my "serendipia" Meeting you was a lucky, precious, and unexpected event.

Everything is fun with you, from our games on Arena Breakout to those karaoke nights where your ears suffer. I love how patiently you've been my English teacher, making every new word an excuse to admire you a little more.

Thank you for accepting me. The 14th was the moment my reality became more beautiful than any dream. Thank you for letting me be a part of your story, for every "Hm" that lights up my screen, and for being my safe haven.

You're my favorite person, my favorite notification, and the most beautiful reason I have to smile every morning. No matter how tired I might be of the world, I'll never get tired of you.

I love you so much, I like you a lot, I'll always try to have my spark to make you smile and cheer you up a little, the goal is to make you fall in love with me kekekeke`;

        const audiosPersonalizados = {
            "March 24": "Lola.mp3", "March 25": "Serpiente.mp3", "March 27": "Bartolito.mp3",
            "March 28": "Tayo.mp3", "April 11": "Tu.mp3"
        };

        let currentAudio = null;
        const startDate = new Date(2026, 2, 18);
        const declarationDate = new Date(2026, 3, 11);
        const officialDate = new Date(2026, 3, 14);
        const anniversaryDate = new Date(2026, 4, 14);

        let currentDate = new Date(startDate);
        let dayCount = 1;

        const dateDisplay = document.getElementById('date-display');
        const messageText = document.getElementById('message-text');
        const dayCounter = document.getElementById('day-counter');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnLetter = document.getElementById('btn-letter');
        const letterScene = document.getElementById('letter-scene');
        const videoScene = document.getElementById('video-scene');
        const videoIframe = document.getElementById('video-iframe');

        function formatDate(date) {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            return `${months[date.getMonth()]} ${date.getDate()}`;
        }

        function playSoundForDate(dateStr) {
            const audioUrl = audiosPersonalizados[dateStr];
            if (audioUrl) {
                if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                currentAudio = new Audio(audioUrl);
                currentAudio.volume = 0.5;
                currentAudio.play().catch(e => console.log("Blocked:", e));
            }
        }

        function advanceDay() {
            if (currentDate >= anniversaryDate) return;
            currentDate.setDate(currentDate.getDate() + 1);
            dayCount++;
            updateUI();
        }

        function previousDay() {
            if (currentDate <= startDate) return;
            currentDate.setDate(currentDate.getDate() - 1);
            dayCount--;
            updateUI();
        }

        function updateUI() {
            const dateStr = formatDate(currentDate);
            dateDisplay.innerText = dateStr;
            dayCounter.innerText = `Day ${dayCount} of our history`;
            
            playSoundForDate(dateStr);

            let finalMessage = mensajesPersonalizados[dateStr];
            if (!finalMessage) {
                if (currentDate < declarationDate) {
                    finalMessage = "Every conversation brought us closer. Discovering your world bit by bit.";
                } else if (currentDate > declarationDate && currentDate < officialDate) {
                    finalMessage = "Three days of waiting that felt like centuries, but my heart was at peace because it was you.";
                } else {
                    finalMessage = "Living our present, building memories every 24 hours.";
                }
            }
            messageText.innerText = finalMessage;

            // Navegación
            btnPrev.style.opacity = currentDate > startDate ? "1" : "0";
            btnPrev.style.pointerEvents = currentDate > startDate ? "auto" : "none";

            // Visuales
            if (currentDate >= declarationDate) {
                dateDisplay.classList.add('milestone-glow');
                spawnHearts(currentDate >= anniversaryDate ? 20 : 8);
            } else {
                dateDisplay.classList.remove('milestone-glow');
            }

            if (currentDate >= anniversaryDate) {
                btnNext.classList.add('hidden');
                btnLetter.classList.remove('hidden');
                document.getElementById('final-stats').classList.remove('hidden');
            } else {
                btnNext.classList.remove('hidden');
                btnLetter.classList.add('hidden');
                document.getElementById('final-stats').classList.add('hidden');
            }
        }

        function showLetter() {
            document.querySelector('.letter-content').innerText = contenidoCarta;
            letterScene.classList.remove('hidden');
        }

        function hideLetter() {
            letterScene.classList.add('hidden');
        }

        function showVideo() {
            letterScene.classList.add('hidden');
            videoScene.classList.remove('hidden');
            if (currentAudio) currentAudio.pause();
            videoIframe.src = `https://www.youtube.com/embed/LCGX9-oIfDY?autoplay=1&rel=0&modestbranding=1`;
        }

        function hideVideo() {
            videoScene.classList.add('hidden');
            videoIframe.src = ""; 
        }

        function spawnHearts(count) {
            const container = document.getElementById('particles-container');
            for(let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
                heart.style.opacity = Math.random() * 0.3 + 0.1;
                const dur = Math.random() * 2 + 3;
                heart.style.transition = `transform ${dur}s linear, opacity ${dur}s ease-out`;
                container.appendChild(heart);
                setTimeout(() => {
                    heart.style.transform = `translateY(-110vh) translateX(${Math.random()*100-50}px) rotate(${Math.random()*360}deg)`;
                    heart.style.opacity = '0';
                }, 50);
                setTimeout(() => heart.remove(), dur * 1000);
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
